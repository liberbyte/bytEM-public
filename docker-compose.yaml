version: '3.6'

services:

  bytem-app:
    image: liberbyteadmin/bytem:app
    container_name: bytem-app
    hostname: bytem-app
    restart: always
    mem_limit: 512m
    env_file:
      - .env.bytem
    environment:
      BYTEM_DOMAIN: ${BYTEM_DOMAIN:-${DOMAIN_NAME}}
      MATRIX_DOMAIN: ${MATRIX_DOMAIN:-${MATRIX_SERVER_NAME}}
      NODE_ENV: ${NODE_ENV}
      CONFIG_TYPE: ${CONFIG_TYPE}
      API_HOST: ${API_HOST}
      MATRIX_SERVER: ${MATRIX_SERVER}
      EXCH_SERVER: ${EXCH_SERVER}
    ports:
      - 80:80
      - 443:443
      - 8448:8448
    volumes:
      - ./generated_config_files/nginx_config:/etc/nginx/conf.d
      - ./generated_config_files/nginx_config/config.js:/usr/share/nginx/html/config.js
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - bytem-network

  bytem-be:
    image: liberbyteadmin/bytem:be
    container_name: bytem-be
    hostname: bytem-be
    restart: always
    depends_on:
      bytem-rabbitmq:
        condition: service_started
      bytem-synapse-db:
        condition: service_healthy
      bytem-synapse:
        condition: service_healthy
    env_file:
      - .env.bytem
    environment:
      - NODE_ENV=production
      - RABBITMQ_URL=amqp://bytem-rabbitmq:5672/bytem
      - SOLR_URL=http://bytem-solr:8983
      - API_HOST_INTERNAL=http://bytem-be:3000
    ports:
      - 9999:9999
      - 3000:3000
    volumes:
      - ./.env.bytem:/app/.env.bytem
      - ./certbot/conf:/etc/letsencrypt
    dns:
      - 8.8.8.8
      - 8.8.4.4
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - bytem-network

  bytem-bot:
    image: liberbyteadmin/bytem:bot
    container_name: bytem-bot
    hostname: bytem-bot
    restart: always
    depends_on:
      bytem-rabbitmq:
        condition: service_started
      bytem-synapse-db:
        condition: service_healthy
      bytem-synapse:
        condition: service_healthy
    env_file:
      - .env.bytem
    environment:
      - NODE_ENV=production
      - RABBITMQ_URL=amqp://bytem-rabbitmq:5672/bytem
      - SOLR_URL=http://bytem-solr:8983
    ports:
      - 4000:4000
    volumes:
      - ./.env.bytem:/app/.env.bytem
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - bytem-network

  bytem-rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: bytem-rabbitmq
    hostname: bytem-rabbitmq
    restart: always
    env_file:
      - .env.bytem
    ports:
      - 5672:5672
      - 15672:15672
    volumes:
      - bytem-rabbitmq-data:/var/lib/rabbitmq/
      - bytem-rabbitmq-log:/var/log/rabbitmq
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bytem-network

  bytem-solr:
    image: liberbyteadmin/bytem:solr
    container_name: bytem-solr
    hostname: bytem-solr
    restart: always
    user: root
    depends_on:
      - bytem-be
    environment:
      - SOLR_LOG_LEVEL=WARN
      - SOLR_OPTS=-Dlog4j2.formatMsgNoLookups=true
    ports:
      - "8983:8983"
    volumes:
      - bytem-solr-data:/var/solr
    command:
      - -force
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bytem-network

  bytem-synapse:
    image: liberbyteadmin/bytem:synapse
    container_name: bytem-synapse
    hostname: bytem-synapse
    restart: always
    depends_on:
      bytem-synapse-db:
        condition: service_healthy
    env_file:
      - .env.bytem
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    ports:
      - 8008:8008
      - 8009:8009
    volumes:
      - ./generated_config_files/synapse_config:/data
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bytem-network

  bytem-synapse-db:
    image: docker.io/postgres:14-alpine
    container_name: bytem-synapse-db
    hostname: bytem-synapse-db
    restart: always
    env_file:
      - .env.bytem
    environment:
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - 5432:5432
    volumes:
      - bytem-synapse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - bytem-network

  bytem-promtail:
    image: grafana/promtail:2.9.0
    container_name: bytem-promtail
    hostname: bytem-promtail
    restart: always
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - bytem-network

  bytem-pwa:
    image: liberbyteadmin/bytem:pwa
    container_name: bytem-pwa
    hostname: bytem-pwa
    restart: always
    depends_on:
      - bytem-be
    env_file:
      - .env.bytem
    environment:
      - NODE_ENV=production
      - BYTEM_DOMAIN=${BYTEM_DOMAIN:-${DOMAIN_NAME}}
      - MATRIX_DOMAIN=${MATRIX_DOMAIN:-${MATRIX_SERVER_NAME}}
      - NEXT_PUBLIC_API_BASE_URL=${API_HOST}
      - PWA_URL=${API_HOST}/
      - PWA_BYTEM_DEMROOM_FRAME_BACKLINK=${API_HOST}/
      - PWA_DEMAND_BYTEM_GUEST=${API_HOST}/
      - PWA_MATRIX_BYTEM_URL=${MATRIX_SERVER}/
    ports:
      - 8002:3002
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bytem-network

networks:
  bytem-network:
    name: bytem-network
    driver: bridge

volumes:
  bytem-rabbitmq-data:
    name: bytem-rabbitmq-data
  bytem-rabbitmq-log:
    name: bytem-rabbitmq-log
  bytem-synapse-db-data:
    name: bytem-synapse-db-data
  bytem-solr-data:
    name: bytem-solr-data
